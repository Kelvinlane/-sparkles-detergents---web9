# Example for a Node Web Service (copy settings to Render — do not use Static Site for the API).
# Dashboard: Root Directory = backend, Build = npm install, Start = npm start
#
# Online card checkout (Paystack — Kenya): set on the Web Service environment:
#   PAYSTACK_SECRET_KEY=sk_live_... or sk_test_... (from Paystack Dashboard → Settings → API)
services:
  - type: web
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
