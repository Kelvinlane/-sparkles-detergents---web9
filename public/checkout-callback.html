<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment | Sparkles Detergents</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap'); body { font-family: 'Poppins', sans-serif; }</style>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">
    <div id="panel" class="bg-white rounded-2xl shadow-xl max-w-md w-full p-8 text-center border border-blue-100">
        <div class="flex justify-center mb-4"><i class="fas fa-spinner fa-spin text-3xl text-blue-600" id="spin"></i></div>
        <p id="status" class="text-gray-700">Verifying payment with Paystack…</p>
        <div id="extra" class="mt-4 text-sm text-left text-gray-600 hidden"></div>
        <div id="actions" class="mt-6 hidden flex flex-col gap-2">
            <a href="/index.html" class="block w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 text-center">Back to shop</a>
        </div>
    </div>
    <script src="js/paystack-order-complete.js"></script>
    <script>
        const API_URL = (() => {
            const h = window.location.hostname;
            if (h === 'localhost' || h === '127.0.0.1') return 'http://localhost:3000/api';
            if (h.endsWith('sparklesdetergents.com')) return window.location.origin + '/api';
            return 'https://www.sparklesdetergents.com/api';
        })();
        const PENDING_KEY = 'sparkles_paystack_pending';

        function esc(s) {
            return String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function showActions() {
            document.getElementById('spin').classList.add('hidden');
            document.getElementById('actions').classList.remove('hidden');
        }

        async function main() {
            const statusEl = document.getElementById('status');
            const extraEl = document.getElementById('extra');
            const params = new URLSearchParams(window.location.search);
            const ref = (params.get('reference') || params.get('trxref') || '').trim();

            if (!ref) {
                statusEl.textContent = 'Missing payment reference.';
                statusEl.className = 'text-red-600 font-medium';
                showActions();
                return;
            }

            let pending = null;
            try {
                pending = JSON.parse(sessionStorage.getItem(PENDING_KEY) || 'null');
            } catch (e) {}

            if (!pending || pending.version !== 1 || !Array.isArray(pending.cart)) {
                statusEl.innerHTML = 'We could not restore your cart after payment. If you were charged, contact us with Paystack reference:<br><code class="text-xs break-all">' + esc(ref) + '</code>';
                statusEl.className = 'text-amber-800';
                sessionStorage.removeItem(PENDING_KEY);
                showActions();
                return;
            }

            if (typeof window.sparklesCompletePaystackPending !== 'function') {
                statusEl.textContent = 'Checkout script failed to load.';
                statusEl.className = 'text-red-600 font-medium';
                showActions();
                return;
            }

            const result = await window.sparklesCompletePaystackPending(API_URL, ref, pending);
            sessionStorage.removeItem(PENDING_KEY);

            if (!result.ok) {
                statusEl.textContent = result.error || 'Could not complete your order.';
                statusEl.className = 'text-red-600 font-medium';
                if (result.partialIds && result.partialIds.length) {
                    extraEl.textContent = 'Completed line items: ' + result.partialIds.join(', ');
                    extraEl.classList.remove('hidden');
                }
                showActions();
                return;
            }

            const mode = result.mode === 'perLine' ? 'perLine' : 'singleOrder';
            const p = result.pending || pending;
            if (mode === 'singleOrder') {
                const oid = result.orderIds && result.orderIds[0] ? result.orderIds[0] : '';
                statusEl.innerHTML =
                    '<span class="text-green-700 font-bold text-lg">Order placed — Thank you!</span><p class="mt-2 text-sm text-gray-600">Paystack ref: <code>' +
                    esc(result.paystackRef || ref) +
                    '</code></p><p class="text-sm text-gray-600">Order ID: <code>#' +
                    esc(oid) +
                    '</code></p><p class="text-sm text-gray-600 mt-1">Total: Ksh ' +
                    esc(p.total_amount) +
                    '</p>';
                extraEl.classList.add('hidden');
            } else {
                statusEl.innerHTML =
                    '<span class="text-green-700 font-bold text-lg">Order placed — Thank you!</span><p class="mt-2 text-sm text-gray-600">Paystack ref: <code>' +
                    esc(result.paystackRef || ref) +
                    '</code></p><p class="text-sm text-gray-600">Group: #' +
                    esc(p.orderIdBase) +
                    '</p><p class="text-sm text-gray-600 mt-1">Total: Ksh ' +
                    esc(p.total_amount) +
                    '</p>';
                extraEl.classList.add('hidden');
            }
            showActions();
        }
        main().catch(function (err) {
            document.getElementById('status').textContent = err.message || String(err);
            document.getElementById('status').className = 'text-red-600';
            showActions();
        });
    </script>
</body>
</html>
